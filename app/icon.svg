<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Background: deep navy blue rounded square -->
  <rect width="100" height="100" rx="21" fill="#2B3F90"/>
  <!-- Top wave: 2 smooth full sine cycles, cubic bezier approximation -->
  <path d="M10 38 C15 29 25 29 30 38 C35 47 45 47 50 38 C55 29 65 29 70 38 C75 47 85 47 90 38"
        stroke="#6B9ED4" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Middle dashed line -->
  <line x1="10" y1="51" x2="90" y2="51"
        stroke="#8DBFE8" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="9 6"/>
  <!-- Bottom wave: 2 smooth full sine cycles -->
  <path d="M10 64 C15 55 25 55 30 64 C35 73 45 73 50 64 C55 55 65 55 70 64 C75 73 85 73 90 64"
        stroke="#6B9ED4" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
