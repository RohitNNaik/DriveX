<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Exact icon extracted from official Safaar logo (concept 2 — royal blue) -->
  <rect width="100" height="100" rx="20" fill="#1A3A8F"/>
  <!-- Top wave -->
  <path d="M20 37 Q30 27 40 37 Q50 47 60 37 Q70 27 80 37"
        stroke="#60C7F0" stroke-width="3.2" stroke-linecap="round" fill="none"/>
  <!-- Middle dashed line -->
  <line x1="20" y1="50" x2="80" y2="50"
        stroke="#60C7F0" stroke-width="2" stroke-linecap="round" stroke-dasharray="6 4"/>
  <!-- Bottom wave -->
  <path d="M20 63 Q30 53 40 63 Q50 73 60 63 Q70 53 80 63"
        stroke="#60C7F0" stroke-width="3.2" stroke-linecap="round" fill="none"/>
</svg>
